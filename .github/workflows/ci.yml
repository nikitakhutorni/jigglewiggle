name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install GNOME packaging tools
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin gnome-shell

      - name: Validate project
        run: npm test

      - name: Build extension bundle
        run: ./scripts/pack.sh

